## Canonical Schema Definition

```sql
-- EVENTS TABLE (Normalized from CSV)
CREATE TABLE events (
    event_id INTEGER PRIMARY KEY,  -- Original ID
    match_id VARCHAR(50) NOT NULL,  -- DERIVED: "JUV_GAL_20260225"
    half SMALLINT NOT NULL CHECK (half BETWEEN 1 AND 4),
    start_time DECIMAL(10,2) NOT NULL,  -- Video timestamp (seconds)
    end_time DECIMAL(10,2) NOT NULL,
    match_time DECIMAL(10,2) GENERATED ALWAYS AS (start_time - 5.24),  -- DERIVED
    
    -- Entity references
    player_id INTEGER REFERENCES players(player_id),
    team_id INTEGER NOT NULL REFERENCES teams(team_id),
    action_id INTEGER NOT NULL REFERENCES actions(action_id),
    
    -- Spatial data
    pos_x DECIMAL(5,2) CHECK (pos_x BETWEEN 0 AND 105),
    pos_y DECIMAL(5,2) CHECK (pos_y BETWEEN 0 AND 68),
    
    -- Audit
    source_file VARCHAR(255),
    raw_code TEXT,  -- Original unparsed code
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    
    -- Constraints
    CONSTRAINT valid_duration CHECK (end_time >= start_time)
);

-- PLAYERS TABLE
CREATE TABLE players (
    player_id INTEGER PRIMARY KEY,  -- Extracted from code
    jersey_number SMALLINT NOT NULL,
    name VARCHAR(100) NOT NULL,
    team_id INTEGER REFERENCES teams(team_id),
    position VARCHAR(10),  -- From XLSX: LD, LCD, RCDM, etc.
    
    UNIQUE (team_id, jersey_number)
);

-- TEAMS TABLE
CREATE TABLE teams (
    team_id INTEGER PRIMARY KEY,
    name VARCHAR(100) NOT NULL,
    short_code VARCHAR(3)
);

-- ACTIONS TABLE (Taxonomy)
CREATE TABLE actions (
    action_id INTEGER PRIMARY KEY AUTO_INCREMENT,
    action_name VARCHAR(100) NOT NULL UNIQUE,
    category VARCHAR(50),  -- pass, shot, duel, etc.
    is_success BOOLEAN,
    parent_action_id INTEGER REFERENCES actions(action_id)
);

-- PLAYER_MATCH_STATS (From XLSX)
CREATE TABLE player_match_stats (
    stat_id INTEGER PRIMARY KEY AUTO_INCREMENT,
    match_id VARCHAR(50) NOT NULL,
    player_id INTEGER REFERENCES players(player_id),
    
    -- Performance metrics
    minutes_played INTEGER,
    goals INTEGER,
    assists INTEGER,
    xg DECIMAL(4,2),
    xa DECIMAL(4,2),
    
    -- Pass metrics
    passes_attempted INTEGER,
    passes_completed INTEGER,
    pass_accuracy DECIMAL(4,3),
    key_passes INTEGER,
    progressive_passes INTEGER,
    long_passes INTEGER,
    
    -- Duel metrics
    duels_attempted INTEGER,
    duels_won INTEGER,
    aerial_duels_attempted INTEGER,
    aerial_duels_won INTEGER,
    
    -- Additional (108 columns available)
    raw_stats JSON,  -- Store full XLSX row
    
    UNIQUE (match_id, player_id)
);
```

## Entity Resolution Rules

```python
# Parsing regex for 'code' column
CODE_PATTERN = r'^(\d+)\.\s+(.+?)\s+\((\d+)\)\s*-\s*(.+)$'
# Groups: (1) jersey_number, (2) player_name, (3) player_id, (4) action

# Team extraction
TEAM_PATTERN = r'^(.+?)\s+\((\d+)\)$'
# Groups: (1) team_name, (2) team_id

# Entity lookup
TEAM_LOOKUP = {
    38876: {"name": "Juventus FC", "short": "JUV"},
    29205: {"name": "Galatasaray", "short": "GAL"}
}
```

## Validation Rules

```yaml
validation:
  temporal:
    - rule: "start_time <= end_time"
      severity: "FATAL"
    - rule: "start_time >= 5.24"  # Video offset
      severity: "ERROR"
    - rule: "end_time <= 8200"  # Max 136 min
      severity: "WARNING"
      
  spatial:
    - rule: "pos_x BETWEEN 0 AND 105"
      severity: "ERROR"
    - rule: "pos_y BETWEEN 0 AND 68"
      severity: "ERROR"
    - rule: "goalkeeper events pos_x < 25 OR pos_x > 80"
      severity: "WARNING"
      
  entity:
    - rule: "player_id IN players table"
      severity: "ERROR"
    - rule: "team_id IN (38876, 29205)"
      severity: "FATAL"
      
  cross_validation:
    - rule: "SUM(csv_events) = xlsx_totals"
      severity: "WARNING"
      tolerance: 0.01  # 1%
```

