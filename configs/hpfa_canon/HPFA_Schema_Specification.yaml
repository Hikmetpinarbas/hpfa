## Known Issues & Workarounds

```yaml
issues:
  - id: "SCHEMA_001"
    description: "Team CSV missing 'team' column"
    affected_files: ["csv_team"]
    workaround: "Extract team_id from 'code' column using TEAM_PATTERN"
    
  - id: "DATA_001"
    description: "Video offset not documented"
    value: 5.24
    workaround: "Subtract 5.24 from all timestamps for match time"
    
  - id: "MISSING_001"
    description: "No possession chain identifiers"
    workaround: "Reconstruct using temporal clustering (events within 30s)"
    
  - id: "MISSING_002"
    description: "No end coordinates for passes"
    workaround: "Infer from next event's start position (±uncertainty)"
    
  - id: "NULL_001"
    description: "8 rows with NULL team/coordinates"
    cause: "System events (Start of half, etc.)"
    workaround: "Filter by action type 'Start of' prefix"
```

